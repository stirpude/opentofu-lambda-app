name: Validate Configuration

on:
  push:
    branches:
      - '**'
    paths:
      - '**.tf'
      - 'src/**'
      - '.github/workflows/validate.yml'
  pull_request:
    paths:
      - '**.tf'
      - 'src/**'

env:
  TF_VERSION: 1.6.0

jobs:
  validate:
    name: Validate & Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TF_VERSION }}

      - name: Initialize OpenTofu (no backend)
        run: tofu init -backend=false

      - name: Validate OpenTofu configuration
        run: tofu validate

      - name: Format check
        run: |
          if tofu fmt -check -recursive; then
            echo "✅ All files are properly formatted"
          else
            echo "❌ Formatting issues found. Run 'tofu fmt -recursive' to fix."
            tofu fmt -recursive -no-color
            exit 1
          fi

      - name: Check for common issues
        run: |
          echo "Checking for hardcoded secrets..."
          if grep -r "AKIA" . --include="*.tf" --include="*.ts"; then
            echo "⚠️  Found potential AWS access keys"
            exit 1
          fi
          echo "✅ No hardcoded secrets detected"

      - name: Lint TypeScript
        run: |
          cd src
          npm install
          npm run build
          echo "✅ TypeScript compilation successful"

      - name: Create validation report
        run: |
          echo "## Validation Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ OpenTofu validation passed" >> $GITHUB_STEP_SUMMARY
          echo "✅ Format check passed" >> $GITHUB_STEP_SUMMARY
          echo "✅ Security checks passed" >> $GITHUB_STEP_SUMMARY
          echo "✅ TypeScript compilation successful" >> $GITHUB_STEP_SUMMARY
