name: Destroy Infrastructure

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: 'Type "destroy" to confirm infrastructure destruction'
        required: true
        type: string

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.6.0

jobs:
  destroy:
    name: Destroy Infrastructure
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Confirm destruction
        if: github.event.inputs.confirm_destroy != 'destroy'
        run: |
          echo "❌ Destruction cancelled - confirmation text did not match"
          exit 1

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Initialize OpenTofu
        run: tofu init
        env:
          TF_INPUT: false

      - name: Destroy infrastructure
        run: tofu destroy -auto-approve
        env:
          TF_INPUT: false

      - name: Create destruction summary
        run: |
          echo "## Infrastructure Destruction Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ All resources have been destroyed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Destroyed Resources:**" >> $GITHUB_STEP_SUMMARY
          echo "- AWS Lambda Function" >> $GITHUB_STEP_SUMMARY
          echo "- IAM Role" >> $GITHUB_STEP_SUMMARY
          echo "- Deployment Package" >> $GITHUB_STEP_SUMMARY
